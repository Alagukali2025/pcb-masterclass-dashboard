<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCB Masterclass Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Style for tables added for the new content */
        .content-table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.875rem; }
        .content-table th, .content-table td { border: 1px solid #e5e7eb; padding: 0.75rem; text-align: left; }
        .content-table th { background-color: #f8fafc; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-50 text-zinc-900 h-screen flex overflow-hidden">
    
    <aside class="hidden md:flex flex-col w-64 border-r border-zinc-200 bg-white z-20">
        <div id="logo-btn" class="h-16 flex items-center px-6 border-b border-zinc-200 font-bold text-lg text-zinc-800 cursor-pointer hover:bg-zinc-50 transition-colors">
            <i class="fa-solid fa-layer-group text-blue-600 mr-2"></i> PCB Masterclass
        </div>
        <nav class="flex-1 py-6">
            <ul class="space-y-2 px-3 text-sm font-medium text-zinc-600" id="sidebar-menu">
                <li data-page="footprint" class="nav-item px-3 py-2.5 rounded-md cursor-pointer hover:bg-zinc-100 transition-colors flex items-center">
                    <i class="fa-solid fa-microchip w-6 text-center"></i> Footprint Creation
                </li>
                <li data-page="stackup" class="nav-item px-3 py-2.5 rounded-md cursor-pointer hover:bg-zinc-100 transition-colors flex items-center">
                    <i class="fa-solid fa-layer-group w-6 text-center"></i> Stackup Design
                </li>
            </ul>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="h-16 flex items-center justify-between px-6 border-b border-zinc-200 bg-white/80 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center">
                <button id="back-btn" class="hidden mr-4 p-2 hover:bg-zinc-100 rounded-full transition-colors text-zinc-600" title="Back to Dashboard">
                    <i class="fa-solid fa-arrow-left text-lg"></i>
                </button>
                <div class="flex items-center bg-zinc-100 rounded-md px-3 py-2 w-64 md:w-96 border border-zinc-200 focus-within:border-blue-500 transition-colors">
                    <i class="fa-solid fa-search text-zinc-400"></i>
                    <input type="text" placeholder="Search rules, standards..." class="bg-transparent border-none outline-none ml-2 text-sm w-full">
                </div>
            </div>
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-sm font-bold shadow-sm">JD</div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-10 bg-slate-50">
            <div id="app-content" class="max-w-4xl mx-auto fade-in"></div>
        </div>
    </main>

    <script>
        const db = {
            dashboard: {
                title: "Learning Dashboard",
                intro: "Select a topic below to begin your engineering journey.",
                modules: [
                    { id: "footprint", icon: "fa-microchip", title: "Footprint Creation", desc: "Master IPC-7351 standards and land patterns." },
                    { id: "stackup", icon: "fa-layer-group", title: "Stackup Design", desc: "Understand materials, prepreg, and cores." },
                    { id: "diff_pair", icon: "fa-code-merge", title: "Differential Pair Routing", desc: "Learn phase matching and coupling." },
                    { id: "high_speed", icon: "fa-bolt", title: "High-Speed Routing", desc: "Impedance control and length matching." },
                    { id: "ddr", icon: "fa-memory", title: "DDR Routing", desc: "Fly-by topology and byte lane routing." },
                    { id: "emi_emc", icon: "fa-shield-halved", title: "EMI / EMC", desc: "Mitigate radiation and ensure compliance." },
                    { id: "dfm_dft", icon: "fa-industry", title: "DFM / DFT", desc: "Design for manufacturing and testing." },
                    { id: "si_pi", icon: "fa-wave-square", title: "SI/PI Calculation", desc: "Signal and power integrity basics." }
                ]
            },
            footprint: {
                title: "Footprint Creation (IPC-7351)",
                intro: "A footprint (or land pattern) is the physical arrangement of copper pads on a PCB. Designing it incorrectly leads to tombstoning, solder bridges, and manufacturing failures.",
                sections: [
                    {
                        heading: "The IPC-7351 Standard",
                        content: "IPC-7351 is the global standard for surface mount design. It relies on mathematical models to calculate the exact pad size based on the component's leads and required solder fillets (Toe, Heel, and Side)."
                    },
                    {
                        heading: "The 3 Density Levels",
                        content: "Not all boards are the same. IPC defines three density levels to determine how much extra pad area you need:",
                        cards: [
                            { title: "Level A (Maximum)", text: "For low-density boards or extreme environments. Largest solder joints for maximum physical strength." },
                            { title: "Level B (Nominal)", text: "The standard for most desktop and consumer electronics. A perfect balance between size and reliability." },
                            { title: "Level C (Least)", text: "For high-density mobile devices. Minimal solder joints to save maximum board space." }
                        ]
                    },
                    {
                        heading: "Design Guidelines & Courtyard",
                        content: "The <strong>Courtyard</strong> is the absolute minimum area required around a component. It includes the component body, the pads, and an extra 'excess' boundary to prevent pick-and-place machines from crashing components into each other."
                    },
                    {
                        heading: "Common Mistakes to Avoid",
                        list: [
                            "Placing silkscreen over exposed copper pads (prevents solder from sticking).",
                            "Forgetting to mark Pin 1 on both the Assembly and Silkscreen layers.",
                            "Ignoring manufacturing tolerances and making the courtyard too tight."
                        ]
                    }
                ],
                checklist: [
                    "Verify datasheet dimensions and tolerances.",
                    "Calculate Toe, Heel, and Side fillets for Density Level B.",
                    "Ensure Silkscreen clearance is at least 0.1mm from pads.",
                    "Add Courtyard polygon on the correct mechanical layer.",
                    "Verify 3D STEP model aligns perfectly with pads."
                ]
            },
            // Task: Content Integration from IPC_PCB_Stackup_Design.pdf
            stackup: {
                title: "PCB Stackup Design",
                intro: "The ordered arrangement of copper layers, prepreg (B-stage resin), and core (C-stage) materials. It is the foundation for signal integrity, power delivery, and EMC compliance[cite: 5, 7].",
                sections: [
                    {
                        heading: "Stackup Fundamentals & Materials",
                        content: "IPC-2221B and IPC-4101C govern material selection and construction[cite: 8].",
                        table: {
                            headers: ["Term", "Definition", "Typical Value"],
                            rows: [
                                ["Core", "Fully cured (C-stage) dielectric with copper laminated on both sides [cite: 12].", "200-1200 μm [cite: 12]"],
                                ["Prepreg", "Partially cured (B-stage) sheet. Bonds during lamination [cite: 12].", "75-200 μm [cite: 12]"],
                                ["εr (Dk)", "Relative dielectric constant of insulating material [cite: 12].", "FR4: 4.0-4.8 [cite: 12]"],
                                ["1 oz Cu", "Standard copper weight (35 µm thickness) [cite: 12].", "35 µm [cite: 12]"]
                            ]
                        }
                    },
                    {
                        heading: "Core Stackup Principles",
                        cards: [
                            { title: "Symmetry Rule", text: "Stackups must be mirror-symmetric about the center to prevent board warpage during reflow (IPC-2221B)[cite: 43, 44]." },
                            { title: "Reference Planes", text: "High-speed signals must have an adjacent solid reference plane to provide clear return current paths[cite: 26, 49]." },
                            { title: "Orthogonal Routing", text: "Route adjacent signal layers orthogonally to minimize broadside coupling[cite: 35]." }
                        ]
                    },
                    {
                        heading: "Impedance Control (IPC-2141A)",
                        content: "Controlled impedance prevents signal reflections that corrupt eye diagrams and cause bit errors[cite: 69, 73, 74].",
                        list: [
                            "Microstrip: Single-ended trace on an outer layer with one reference plane[cite: 75, 76].",
                            "Stripline: Inner layer trace centered between two reference planes for better shielding[cite: 82, 83].",
                            "Differential: Critical for USB (90Ω) and Ethernet/HDMI (100Ω)[cite: 88, 92]."
                        ]
                    }
                ],
                checklist: [
                    "Verify mirror-symmetry about the board center plane[cite: 119].",
                    "Ensure every high-speed layer has an uninterrupted reference plane[cite: 118].",
                    "Place GND return vias within 250 mil of signal layer transitions[cite: 59, 119].",
                    "Verify target impedance with manufacturer field solvers[cite: 93].",
                    "No signal routing across reference plane splits or voids[cite: 51, 119]."
                ]
            }
        };

        function loadPage(pageId) {
            const contentDiv = document.getElementById('app-content');
            const backBtn = document.getElementById('back-btn');
            const data = db[pageId] || { title: "Module Coming Soon", intro: "This engineering module is currently under development." };
            
            // Toggle Back Button (Task: Back Navigation Feature)
            if (pageId === 'dashboard') {
                backBtn.classList.add('hidden');
            } else {
                backBtn.classList.remove('hidden');
            }

            contentDiv.classList.remove('fade-in');
            void contentDiv.offsetWidth; 
            contentDiv.classList.add('fade-in');

            let html = `
                <div class="mb-8 border-b border-zinc-200 pb-6">
                    <h1 class="text-3xl md:text-4xl font-bold text-zinc-900 tracking-tight">${data.title}</h1>
                    <p class="text-zinc-600 mt-3 text-lg leading-relaxed whitespace-pre-line">${data.intro}</p>
                </div>
            `;

            if (pageId === 'dashboard' && data.modules) {
                html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-8">`;
                data.modules.forEach(mod => {
                    html += `
                        <div onclick="loadPage('${mod.id}')" class="bg-white border border-zinc-200 p-6 rounded-xl shadow-sm hover:shadow-lg hover:border-blue-400 transform hover:-translate-y-1 transition-all cursor-pointer group">
                            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-4 text-xl group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                <i class="fa-solid ${mod.icon}"></i>
                            </div>
                            <h3 class="font-bold text-zinc-900 mb-2 group-hover:text-blue-600 transition-colors">${mod.title}</h3>
                            <p class="text-sm text-zinc-500">${mod.desc}</p>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            if (data.sections) {
                html += `<div class="space-y-10">`;
                data.sections.forEach(sec => {
                    html += `<section><h2 class="text-xl font-bold text-zinc-900 mb-3 flex items-center"><i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> ${sec.heading}</h2>`;
                    if (sec.content) html += `<p class="text-zinc-700 leading-relaxed mb-4">${sec.content}</p>`;
                    
                    // Added support for tables in section content
                    if (sec.table) {
                        html += `<div class="overflow-x-auto"><table class="content-table"><thead><tr>`;
                        sec.table.headers.forEach(h => html += `<th>${h}</th>`);
                        html += `</tr></thead><tbody>`;
                        sec.table.rows.forEach(row => {
                            html += `<tr>`;
                            row.forEach(cell => html += `<td>${cell}</td>`);
                            html += `</tr>`;
                        });
                        html += `</tbody></table></div>`;
                    }

                    if (sec.cards) {
                        html += `<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">`;
                        sec.cards.forEach(card => {
                            html += `<div class="bg-white border border-zinc-200 p-5 rounded-lg shadow-sm border-t-4 border-t-blue-500"><h4 class="font-bold text-zinc-900 mb-2">${card.title}</h4><p class="text-sm text-zinc-600">${card.text}</p></div>`;
                        });
                        html += `</div>`;
                    }
                    if (sec.list) {
                        html += `<ul class="space-y-3 mt-4">`;
                        sec.list.forEach(item => {
                            html += `<li class="flex items-start bg-blue-50/50 text-zinc-800 p-3 rounded-md border border-blue-100"><i class="fa-solid fa-circle-info text-blue-500 mr-3 mt-1 text-xs"></i> ${item}</li>`;
                        });
                        html += `</ul>`;
                    }
                    html += `</section>`;
                });
                html += `</div>`;
            }

            if (data.checklist) {
                html += `
                    <div class="mt-12 bg-white border border-zinc-200 rounded-xl shadow-sm p-6 md:p-8">
                        <h3 class="text-xl font-bold text-zinc-900 mb-4 flex items-center"><i class="fa-solid fa-list-check text-emerald-600 mr-3"></i> Final Design Checklist</h3>
                        <ul class="space-y-3">
                `;
                data.checklist.forEach(item => {
                    html += `<li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 transition-colors cursor-pointer" onclick="toggleCheck(this)"><i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i> ${item}</li>`;
                });
                html += `</ul></div>`;
            }

            contentDiv.innerHTML = html;

            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(nav => {
                nav.classList.remove('bg-blue-50', 'text-blue-600');
                nav.classList.add('hover:bg-zinc-100');
                if (nav.getAttribute('data-page') === pageId) {
                    nav.classList.remove('hover:bg-zinc-100');
                    nav.classList.add('bg-blue-50', 'text-blue-600');
                }
            });
        }

        function toggleCheck(element) {
            const icon = element.querySelector('i');
            if (icon.classList.contains('fa-square')) {
                icon.className = 'fa-solid fa-square-check text-emerald-500 mr-3 text-lg';
                element.classList.add('text-zinc-400', 'line-through');
            } else {
                icon.className = 'fa-regular fa-square text-zinc-400 mr-3 text-lg';
                element.classList.remove('text-zinc-400', 'line-through');
            }
        }

        // Event Listeners
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                loadPage(item.getAttribute('data-page'));
            });
        });

        document.getElementById('logo-btn').addEventListener('click', () => loadPage('dashboard'));
        document.getElementById('back-btn').addEventListener('click', () => loadPage('dashboard'));
        
        window.onload = () => loadPage('dashboard');
    </script>
</body>
</html>
