<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCB Masterclass Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-zinc-900 h-screen flex overflow-hidden">
    
    <aside class="hidden md:flex flex-col w-64 border-r border-zinc-200 bg-white z-20">
        <div id="logo-btn" class="h-16 flex items-center px-6 border-b border-zinc-200 font-bold text-lg text-zinc-800 cursor-pointer hover:bg-zinc-50 transition-colors">
            <i class="fa-solid fa-layer-group text-blue-600 mr-2"></i> PCB Masterclass
        </div>
        <nav class="flex-1 py-6">
            <ul class="space-y-2 px-3 text-sm font-medium text-zinc-600" id="sidebar-menu">
                <li data-page="footprint" class="nav-item px-3 py-2.5 rounded-md cursor-pointer hover:bg-zinc-100 transition-colors flex items-center">
                    <i class="fa-solid fa-microchip w-6 text-center mr-2"></i> Footprint Creation
                </li>
                <li data-page="stackup" class="nav-item px-3 py-2.5 rounded-md cursor-pointer hover:bg-zinc-100 transition-colors flex items-center">
                    <i class="fa-solid fa-layer-group w-6 text-center mr-2"></i> Stackup Design
                </li>
            </ul>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="h-16 flex items-center justify-between px-6 border-b border-zinc-200 bg-white/80 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center bg-zinc-100 rounded-md px-3 py-2 w-64 md:w-96 border border-zinc-200 focus-within:border-blue-500 transition-colors">
                <i class="fa-solid fa-search text-zinc-400"></i>
                <input type="text" placeholder="Search rules, standards..." class="bg-transparent border-none outline-none ml-2 text-sm w-full">
            </div>
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-sm font-bold shadow-sm">JD</div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-10 bg-slate-50">
            <div id="app-content" class="max-w-4xl mx-auto fade-in"></div>
        </div>
    </main>

    <script>
        const db = {
            dashboard: {
                title: "Learning Dashboard",
                intro: "Select a topic below to begin your engineering journey.",
                modules: [
                    { id: "footprint", icon: "fa-microchip", title: "Footprint Creation", desc: "Master IPC-7351 standards and land patterns." },
                    { id: "stackup", icon: "fa-layer-group", title: "Stackup Design", desc: "Understand materials, prepreg, and cores per IPC-2221B." },
                    { id: "high_speed", icon: "fa-bolt", title: "High-Speed Routing", desc: "Impedance control and length matching." },
                    { id: "emi_emc", icon: "fa-shield-halved", title: "EMI / EMC", desc: "Mitigate radiation and ensure compliance." }
                ]
            },

            footprint: {
                title: "Footprint Creation (IPC-7351)",
                intro: "A footprint is the physical arrangement of copper pads. Designing it incorrectly leads to tombstoning and manufacturing failures.",
                sections: [
                    { heading: "The IPC-7351 Standard", content: "Mathematical models for Toe, Heel, and Side fillets." }
                ]
            },

            // NEW CONTENT PAGE FROM PDF
            stackup: {
                title: "PCB Stackup Design",
                intro: "A PCB stackup is the foundation for signal integrity and EMC compliance. It is governed by IPC-2221B (Design) and IPC-4101C (Materials).",
                sections: [
                    {
                        heading: "Key Materials",
                        content: "The stackup consists of Core (C-stage) and Prepreg (B-stage) materials.",
                        cards: [
                            { title: "Core", text: "Fully cured dielectric with copper foil. Provides dimensional stability." },
                            { title: "Prepreg", text: "Partially cured glass/resin sheet. Bonds layers and controls height (h)." },
                            { title: "Dk (Dielectric Constant)", text: "FR4 typical value is 4.0-4.8. Affects signal speed." }
                        ]
                    },
                    {
                        heading: "Stackup Structures",
                        content: "Choosing the right layer count is critical for signal return paths.",
                        list: [
                            "2-Layer: Suitable only for low-frequency/power designs. Poor EMI performance.",
                            "4-Layer: Minimum for industrial designs. Includes GND (L2) and PWR (L3) planes.",
                            "6-Layer: Adds stripline layers (L3, L4) for high-density routing.",
                            "IPC Symmetry Rule: Stackups must be mirror-symmetric to prevent board warpage."
                        ]
                    },
                    {
                        heading: "Impedance Control (IPC-2141A)",
                        content: "Traces without a reference plane have undefined impedance, causing reflections and bit errors.",
                        cards: [
                            { title: "Microstrip", text: "Trace on outer layer over one reference plane. 50Ω typical target." },
                            { title: "Stripline", text: "Trace between two reference planes. Provides inherent EMI shielding." },
                            { title: "Diff Pairs", text: "Used for USB (90Ω) and Ethernet/HDMI (100Ω)." }
                        ]
                    }
                ],
                checklist: [
                    "Ensure every signal layer has an uninterrupted reference plane.",
                    "Verify stackup symmetry about the board center plane.",
                    "Place GND return vias within 250 mil of signal layer transitions.",
                    "Include TDR coupons on panel edges for impedance verification."
                ]
            }
        };

        function loadPage(pageId) {
            const contentDiv = document.getElementById('app-content');
            const data = db[pageId] || { title: "Coming Soon", intro: "Under development." };
            
            contentDiv.classList.remove('fade-in');
            void contentDiv.offsetWidth; 
            contentDiv.classList.add('fade-in');

            let html = `
                <div class="mb-8 border-b border-zinc-200 pb-6">
                    <h1 class="text-3xl md:text-4xl font-bold text-zinc-900 tracking-tight">${data.title}</h1>
                    <p class="text-zinc-600 mt-3 text-lg leading-relaxed">${data.intro}</p>
                </div>
            `;

            if (pageId === 'dashboard') {
                html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">`;
                data.modules.forEach(mod => {
                    html += `
                        <div onclick="loadPage('${mod.id}')" class="bg-white border border-zinc-200 p-6 rounded-xl shadow-sm hover:shadow-lg hover:border-blue-400 transition-all cursor-pointer group">
                            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-4 text-xl group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                <i class="fa-solid ${mod.icon}"></i>
                            </div>
                            <h3 class="font-bold text-zinc-900 mb-2 group-hover:text-blue-600 transition-colors">${mod.title}</h3>
                            <p class="text-sm text-zinc-500">${mod.desc}</p>
                        </div>`;
                });
                html += `</div>`;
            }

            if (data.sections) {
                data.sections.forEach(sec => {
                    html += `<section class="mb-10">
                                <h2 class="text-xl font-bold text-zinc-900 mb-3 flex items-center"><i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> ${sec.heading}</h2>
                                <p class="text-zinc-700 mb-4">${sec.content}</p>`;
                    if (sec.cards) {
                        html += `<div class="grid grid-cols-1 md:grid-cols-3 gap-4">`;
                        sec.cards.forEach(card => {
                            html += `<div class="bg-white border border-zinc-200 p-4 rounded-lg shadow-sm border-t-4 border-t-blue-500"><h4 class="font-bold text-sm mb-1">${card.title}</h4><p class="text-xs text-zinc-600">${card.text}</p></div>`;
                        });
                        html += `</div>`;
                    }
                    if (sec.list) {
                        html += `<ul class="space-y-2 mt-4">`;
                        sec.list.forEach(item => {
                            html += `<li class="flex items-start bg-blue-50 text-blue-900 p-3 rounded-md border border-blue-100 text-sm"><i class="fa-solid fa-info-circle text-blue-500 mr-3 mt-0.5"></i> ${item}</li>`;
                        });
                        html += `</ul>`;
                    }
                    html += `</section>`;
                });
            }

            if (data.checklist) {
                html += `<div class="mt-12 bg-white border border-zinc-200 rounded-xl p-6">
                            <h3 class="text-xl font-bold text-zinc-900 mb-4 flex items-center"><i class="fa-solid fa-list-check text-emerald-600 mr-3"></i> Stackup Checklist</h3>
                            <ul class="space-y-3">`;
                data.checklist.forEach(item => {
                    html += `<li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 cursor-pointer" onclick="toggleCheck(this)"><i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i> ${item}</li>`;
                });
                html += `</ul></div>`;
            }

            contentDiv.innerHTML = html;

            document.querySelectorAll('.nav-item').forEach(nav => {
                nav.classList.remove('bg-blue-50', 'text-blue-600');
                if (nav.getAttribute('data-page') === pageId) nav.classList.add('bg-blue-50', 'text-blue-600');
            });
        }

        function toggleCheck(el) {
            const icon = el.querySelector('i');
            icon.className = icon.classList.contains('fa-square') ? 'fa-solid fa-square-check text-emerald-500 mr-3 text-lg' : 'fa-regular fa-square text-zinc-400 mr-3 text-lg';
            el.classList.toggle('text-zinc-400');
            el.classList.toggle('line-through');
        }

        document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', () => loadPage(item.getAttribute('data-page'))));
        document.getElementById('logo-btn').addEventListener('click', () => loadPage('dashboard'));
        window.onload = () => loadPage('dashboard');
    </script>
</body>
</html>
